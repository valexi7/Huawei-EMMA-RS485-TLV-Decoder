text_sensor:
  # Static inverter identity. Slow controller keeps this away from real-time polling.
  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Model"
    id: sun2000_model
    icon: mdi:solar-power
    entity_category: diagnostic
    register_type: holding
    address: 30000
    register_count: 15
    response_size: 30
    raw_encode: UTF8

  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Serial Number"
    id: sun2000_serial_number
    icon: mdi:barcode
    entity_category: diagnostic
    register_type: holding
    address: 30015
    register_count: 10
    response_size: 20
    raw_encode: UTF8

  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Product Code"
    id: sun2000_product_code
    icon: mdi:identifier
    entity_category: diagnostic
    register_type: holding
    address: 30025
    register_count: 10
    response_size: 20
    raw_encode: UTF8

  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Firmware Version"
    id: sun2000_firmware_version
    icon: mdi:chip
    entity_category: diagnostic
    register_type: holding
    address: 30035
    register_count: 15
    response_size: 30
    raw_encode: UTF8

  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Software Version"
    id: sun2000_software_version
    icon: mdi:code-tags
    entity_category: diagnostic
    register_type: holding
    address: 30050
    register_count: 15
    response_size: 30
    raw_encode: UTF8

  # Decoded status/alarm text.
  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Device Status"
    id: sun2000_device_status
    icon: mdi:state-machine
    register_type: holding
    address: 32089
    register_count: 1
    response_size: 2
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t v = modbus::helpers::word_from_hex_str(x, 0);
      switch (v) {
        case 0x0000: return std::string("Standby: initializing");
        case 0x0001: return std::string("Standby: detecting insulation resistance");
        case 0x0002: return std::string("Standby: detecting irradiation");
        case 0x0003: return std::string("Standby: grid detecting");
        case 0x0100: return std::string("Starting");
        case 0x0200: return std::string("On-grid");
        case 0x0201: return std::string("Grid Connection: power limited");
        case 0x0202: return std::string("Grid Connection: self-derating");
        case 0x0203: return std::string("Off-grid mode: running");
        case 0x0300: return std::string("Shutdown: fault");
        case 0x0301: return std::string("Shutdown: command");
        case 0x0302: return std::string("Shutdown: OVGR");
        case 0x0303: return std::string("Shutdown: communication disconnected");
        case 0x0304: return std::string("Shutdown: power limited");
        case 0x0305: return std::string("Shutdown: manual startup required");
        case 0x0306: return std::string("Shutdown: DC switches disconnected");
        case 0x0307: return std::string("Shutdown: rapid cutoff");
        case 0x0308: return std::string("Shutdown: input underpowered");
        case 0x030C: return std::string("Shutdown: ESS end-of-discharge");
        case 0x0401: return std::string("Grid scheduling: cosphi-P curve");
        case 0x0402: return std::string("Grid scheduling: Q-U curve");
        case 0x0403: return std::string("Grid scheduling: PF-U curve");
        case 0x0404: return std::string("Grid scheduling: dry contact");
        case 0x0405: return std::string("Grid scheduling: Q-P curve");
        case 0x0500: return std::string("Spot-check ready");
        case 0x0501: return std::string("Spot-checking");
        case 0x0600: return std::string("Inspecting");
        case 0x0700: return std::string("AFCI self check");
        case 0x0800: return std::string("I-V scanning");
        case 0x0900: return std::string("DC input detection");
        case 0x0A00: return std::string("Running: off-grid charging");
        case 0xA000: return std::string("Standby: no irradiation");
        default: {
          char buf[32];
          snprintf(buf, sizeof(buf), "Unknown: 0x%04X", v);
          return std::string(buf);
        }
      }

  - platform: modbus_controller
    modbus_controller_id: huawei_modbus
    skip_updates: 119  # Hourly (120th round at 30s update interval)
    name: "SUN2000 Active Alarms"
    id: sun2000_active_alarms
    icon: mdi:alert
    register_type: holding
    address: 32008
    register_count: 3
    response_size: 6
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t a1 = modbus::helpers::word_from_hex_str(x, 0);  // bytes 0-1
      uint16_t a2 = modbus::helpers::word_from_hex_str(x, 2);  // bytes 2-3
      uint16_t a3 = modbus::helpers::word_from_hex_str(x, 4);  // bytes 4-5
      std::vector<std::string> alarms;
      auto add = [&](bool active, const char *name) {
        if (active) alarms.push_back(name);
      };

      add(a1 & 0x0001, "High String Input Voltage");
      add(a1 & 0x0002, "DC Arc Fault");
      add(a1 & 0x0004, "String Reverse Connection");
      add(a1 & 0x0008, "String Current Backfeed");
      add(a1 & 0x0010, "Abnormal String Power");
      add(a1 & 0x0020, "AFCI Self-Check Fail");
      add(a1 & 0x0040, "Phase Wire Short-Circuited to PE");
      add(a1 & 0x0080, "Grid Loss");
      add(a1 & 0x0100, "Grid Undervoltage");
      add(a1 & 0x0200, "Grid Overvoltage");
      add(a1 & 0x0400, "Grid Volt. Imbalance");
      add(a1 & 0x0800, "Grid Overfrequency");
      add(a1 & 0x1000, "Grid Underfrequency");
      add(a1 & 0x2000, "Unstable Grid Frequency");
      add(a1 & 0x4000, "Output Overcurrent");
      add(a1 & 0x8000, "Output DC Component Overhigh");

      add(a2 & 0x0001, "Abnormal Residual Current");
      add(a2 & 0x0002, "Abnormal Grounding");
      add(a2 & 0x0004, "Low Insulation Resistance");
      add(a2 & 0x0008, "Overtemperature");
      add(a2 & 0x0010, "Device Fault");
      add(a2 & 0x0020, "Upgrade Failed or Version Mismatch");
      add(a2 & 0x0040, "License Expired");
      add(a2 & 0x0080, "Faulty Monitoring Unit");
      add(a2 & 0x0100, "Faulty Power Collector");
      add(a2 & 0x0200, "Battery abnormal");
      add(a2 & 0x0400, "Active Islanding");
      add(a2 & 0x0800, "Passive Islanding");
      add(a2 & 0x1000, "Transient AC Overvoltage");
      add(a2 & 0x2000, "Peripheral port short circuit");
      add(a2 & 0x4000, "Churn output overload");
      add(a2 & 0x8000, "Abnormal PV module configuration");

      add(a3 & 0x0001, "Optimizer fault");
      add(a3 & 0x0002, "Built-in PID operation abnormal");
      add(a3 & 0x0004, "High input string voltage to ground");
      add(a3 & 0x0008, "External Fan Abnormal");
      add(a3 & 0x0010, "Battery Reverse Connection");
      add(a3 & 0x0020, "On-grid/Off-grid controller abnormal");
      add(a3 & 0x0040, "PV String Loss");
      add(a3 & 0x0080, "Internal Fan Abnormal");
      add(a3 & 0x0100, "DC Protection Unit Abnormal");
      add(a3 & 0x0200, "EL Unit Abnormal");
      add(a3 & 0x0400, "Active Adjustment Instruction Abnormal");
      add(a3 & 0x0800, "Reactive Adjustment Instruction Abnormal");
      add(a3 & 0x1000, "CT Wiring Abnormal");
      add(a3 & 0x2000, "DC Arc Fault ADMC");
      add(a3 & 0x4000, "DC Switch Abnormal");
      add(a3 & 0x8000, "Allowable discharge capacity of the battery is low");

      if (alarms.empty()) return std::string("No active alarms");
      std::string out;
      for (size_t i = 0; i < alarms.size(); i++) {
        if (i > 0) out += "; ";
        out += alarms[i];
      }
      return out;

