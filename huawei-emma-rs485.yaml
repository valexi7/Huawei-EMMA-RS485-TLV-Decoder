substitutions:
  huawei_uart_rx_pin: GPIO21
  huawei_uart_baud_rate: "9600"
  huawei_uart_rx_buffer_size: "512"
  huawei_log_level: INFO
  huawei_tlv_ref: main
  # Always update the nested external component when this package is refreshed.
  # This prevents a new YAML package from compiling against an older cached .inc.
  huawei_tlv_refresh: 0s

external_components:
  - source:
      type: git
      url: https://github.com/valexi7/Huawei-EMMA-RS485-TLV-Decoder
      ref: ${huawei_tlv_ref}
    components:
      - huawei_emma_tlv
    refresh: ${huawei_tlv_refresh}

huawei_emma_tlv:

logger:
  logs:
    huawei_prop: ${huawei_log_level}
    huawei_prop_fc41_frame: INFO

uart:
  id: huawei_emma_uart
  rx_pin: ${huawei_uart_rx_pin}
  baud_rate: ${huawei_uart_baud_rate}
  parity: NONE
  stop_bits: 1
  rx_buffer_size: ${huawei_uart_rx_buffer_size}
  debug:
    direction: RX
    dummy_receiver: true
    after:
      bytes: ${huawei_uart_rx_buffer_size}
      timeout: 50ms
    sequence:
      - lambda: |-
          id(huawei_rx_activity).execute();
          huawei_decode_proprietary_uart_buffer(bytes);

script:
  # Board-independent no-op hook. Include huawei-emma-rx-light.yaml when the
  # chosen board exposes its onboard LED as an ESPHome light.
  - id: huawei_rx_activity
    mode: restart
    then: []

