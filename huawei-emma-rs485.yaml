substitutions:
  huawei_uart_rx_pin: GPIO21
  huawei_uart_baud_rate: "9600"
  huawei_uart_rx_buffer_size: "512"
  huawei_log_level: INFO
  huawei_modbus_tou_device_id: "0"
  huawei_modbus_diagnostic_response_timeout: 15s
  huawei_modbus_tou_write_timeout: 30s
  huawei_tlv_ref: main
  # Always update the nested external component when this package is refreshed.
  # This prevents a new YAML package from compiling against an older cached .inc.
  huawei_tlv_refresh: 0s

external_components:
  - source:
      type: git
      url: https://github.com/valexi7/Huawei-EMMA-RS485-TLV-Decoder
      ref: ${huawei_tlv_ref}
    components:
      - huawei_emma_tlv
    refresh: ${huawei_tlv_refresh}

huawei_emma_tlv:

logger:
  logs:
    huawei_prop: ${huawei_log_level}
    huawei_prop_fc41_frame: INFO
    huawei_modbus: ${huawei_log_level}

uart:
  id: huawei_emma_uart
  rx_pin: ${huawei_uart_rx_pin}
  baud_rate: ${huawei_uart_baud_rate}
  parity: NONE
  stop_bits: 1
  rx_buffer_size: ${huawei_uart_rx_buffer_size}
  debug:
    direction: RX
    dummy_receiver: true
    after:
      bytes: ${huawei_uart_rx_buffer_size}
      timeout: 50ms
    sequence:
      - lambda: |-
          id(huawei_rx_activity).execute();
          huawei_decode_proprietary_uart_buffer(bytes);
          huawei_decode_generic_modbus_uart_buffer(bytes);

script:
  # Board-independent no-op hook. Include huawei-emma-rx-light.yaml when the
  # chosen board exposes its onboard LED as an ESPHome light.
  - id: huawei_rx_activity
    mode: restart
    then: []

  # Manual diagnostic probe only. The host device must add a UART TX pin and,
  # for a non-auto-direction transceiver, a flow_control_pin. No reads are sent
  # automatically. Each request is sent only after the preceding response.
  # Single mode prevents overlapping button sequences.
  - id: huawei_read_tou_configuration
    mode: single
    then:
      - lambda: |-
          huawei_modbus_start_tou_read_sequence(id(huawei_emma_uart),
                                                ${huawei_modbus_tou_device_id});
      - wait_until:
          condition:
            lambda: |-
              return !huawei_modbus_tou_read_sequence_active();
          timeout: ${huawei_modbus_diagnostic_response_timeout}
      - lambda: |-
          huawei_modbus_abort_tou_read_sequence();

  # Writes only values that differ from the last verified readback. Changed
  # schedule data is written first, working mode last, and all three settings
  # are read back before the sequence is considered complete.
  - id: huawei_write_tou_configuration
    mode: single
    then:
      - lambda: |-
          huawei_modbus_start_tou_write_sequence(id(huawei_emma_uart),
                                                 ${huawei_modbus_tou_device_id});
      - wait_until:
          condition:
            lambda: |-
              huawei_modbus_poll_tou_write_sequence();
              return !huawei_modbus_tou_write_sequence_active();
          timeout: ${huawei_modbus_tou_write_timeout}
      - lambda: |-
          huawei_modbus_abort_tou_write_sequence();

  # Disabled-by-default raw Modbus test request. This is intentionally manual
  # and shares the same single-request guard as the TOU controls.
  - id: huawei_send_modbus_diagnostic
    mode: single
    then:
      - lambda: |-
          huawei_modbus_send_diagnostic_request(
              id(huawei_emma_uart),
              static_cast<uint16_t>(id(modbus_diagnostic_device_id).state),
              id(modbus_diagnostic_function_code).state,
              static_cast<uint16_t>(id(modbus_diagnostic_start_register).state),
              static_cast<uint16_t>(id(modbus_diagnostic_word_count).state),
              id(modbus_diagnostic_write_request).state);
      - wait_until:
          condition:
            lambda: |-
              return !huawei_modbus_diagnostic_request_active();
          timeout: ${huawei_modbus_diagnostic_response_timeout}
      - lambda: |-
          huawei_modbus_finish_diagnostic_request();

number:
  - platform: template
    id: modbus_diagnostic_device_id
    name: "ZZ Modbus Test - 1 Device ID"
    icon: mdi:numeric
    entity_category: diagnostic
    disabled_by_default: true
    optimistic: true
    initial_value: 12
    min_value: 0
    max_value: 247
    step: 1
    mode: box

  - platform: template
    id: modbus_diagnostic_start_register
    name: "ZZ Modbus Test - 3 Start Register"
    icon: mdi:format-list-numbered
    entity_category: diagnostic
    disabled_by_default: true
    optimistic: true
    initial_value: 30000
    min_value: 0
    max_value: 65535
    step: 1
    mode: box

  - platform: template
    id: modbus_diagnostic_word_count
    name: "ZZ Modbus Test - 4 Word Count"
    icon: mdi:counter
    entity_category: diagnostic
    disabled_by_default: true
